name: Release plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack plugin
        run: |
          test -f plugin.json
          zip -qr plugin.pcp . -x ".git/*" ".github/*"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" plugin.pcp --title "${GITHUB_REF_NAME}" --notes "Shu plugin release ${GITHUB_REF_NAME}"
